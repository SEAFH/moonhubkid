<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moon Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#2a0055,#0b001a);
color:white;
text-align:center;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* background particles */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image: radial-gradient(#a855f7 1px, transparent 1px);
background-size:40px 40px;
opacity:0.2;
animation:move 20s linear infinite;
}

@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

.container{
position:relative;
background:rgba(20,0,40,0.9);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px #7b2fff;
width:440px;
z-index:2;
}

.title{
font-size:42px;
color:#c084ff;
margin-bottom:10px;
text-shadow:0 0 25px #a855f7;
}

.desc{
opacity:0.8;
margin-bottom:20px;
}

/* script box */

.codebox{
background:#0d1117;
border-radius:10px;
padding:35px 15px 15px 15px;
font-family:monospace;
font-size:12px;
text-align:left;
position:relative;

white-space:nowrap;
overflow-x:auto;
overflow-y:hidden;

box-shadow:0 0 10px #000 inset;
margin-bottom:20px;
}

/* loader.lua text */

.filename{
color:#a855f7;
font-weight:bold;
margin-bottom:10px;
}

/* copy button */

.copybtn{
position:absolute;
right:10px;
top:8px;
background:#21262d;
border:none;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
width:auto;
}

.copybtn:hover{
background:#30363d;
}

/* scrollbar */

.codebox::-webkit-scrollbar{
height:6px;
}

.codebox::-webkit-scrollbar-thumb{
background:#7a2fff;
border-radius:10px;
}

/* buttons */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:linear-gradient(90deg,#7a2fff,#9b59ff);
color:white;
transition:0.25s;
}

button:hover{
box-shadow:0 0 20px #a855f7;
transform:scale(1.03);
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="title">🌙 Moon Hub</div>

<div class="desc">
Best Roblox Script Hub
</div>

<div class="codebox">

<button class="copybtn" onclick="copyScript()">Copy</button>

<div class="filename">loader.lua</div>

loadstring(game:HttpGet('https://raw.githubusercontent.com/SEAFH/Dev-Moon-Hub/main/main.lua'))()

</div>

<button onclick="discord()">Join Discord</button>

<div class="footer">
Moon Hub © 2026
</div>

</div>

<script>

function copyScript(){

const text = "loadstring(game:HttpGet('https://raw.githubusercontent.com/SEAFH/Dev-Moon-Hub/main/main.lua'))()"

navigator.clipboard.writeText(text).then(function(){
alert("Script Copied!")
}).catch(function(){
prompt("Copy script:", text)
})

}

function discord(){
window.open("https://discord.gg/moonhub")
}

</script>

</body>
</html>
