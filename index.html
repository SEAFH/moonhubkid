<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moon Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#2a0055,#0b001a);
color:white;
text-align:center;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* particles */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image: radial-gradient(#a855f7 1px, transparent 1px);
background-size:40px 40px;
opacity:0.2;
animation:move 20s linear infinite;
}

@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b001a;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
flex-direction:column;
}

#intro h1{
font-size:50px;
color:#c084ff;
text-shadow:0 0 30px #a855f7;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}
}

/* MAIN */

.container{
position:relative;
background:rgba(20,0,40,0.9);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px #7b2fff;
width:420px;
z-index:2;
display:none;
}

.title{
font-size:42px;
color:#c084ff;
margin-bottom:10px;
text-shadow:0 0 25px #a855f7;
}

.desc{
opacity:0.8;
margin-bottom:20px;
}

/* script box */

.codebox{
background:#0d1117;
border-radius:10px;
padding:15px;
font-family:monospace;
text-align:left;
font-size:14px;
position:relative;
box-shadow:0 0 10px #000 inset;
}

.copy{
position:absolute;
right:10px;
top:10px;
background:#21262d;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.copy:hover{
background:#30363d;
}

/* buttons */

button.mainbtn{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#7a2fff;
color:white;
transition:0.25s;
}

button.mainbtn:hover{
background:#9b59ff;
box-shadow:0 0 20px #a855f7;
transform:scale(1.03);
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
<h1>🌙 Moon Hub</h1>
<p>Loading...</p>
</div>

<!-- MAIN -->

<div class="container" id="main">

<div class="title">🌙 Moon Hub</div>

<div class="desc">
Best Roblox Script Hub
</div>

<div class="codebox">
<button class="copy" onclick="copyScript()">Copy</button>

loader.lua

<br><br>

loadstring(game:HttpGet('https://raw.moonhub.xyz/loader.lua'))()

</div>

<button class="mainbtn" onclick="discord()">Join Discord</button>

<div class="footer">
Moon Hub © 2026
</div>

</div>

<script>

setTimeout(function(){
document.getElementById("intro").style.display="none"
document.getElementById("main").style.display="block"
},2000)

function copyScript(){

const text = "loadstring(game:HttpGet('https://raw.moonhub.xyz/loader.lua'))()"

navigator.clipboard.writeText(text)

alert("Script Copied!")

}

function discord(){
window.open("https://discord.gg/moonhub")
}

</script>

</body>
</html>
