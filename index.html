<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moon Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#2a0055,#0b001a);
color:white;
text-align:center;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* background particles */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:
radial-gradient(#a855f7 1px, transparent 1px);
background-size:40px 40px;
opacity:0.2;
animation:move 20s linear infinite;
}

@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

.container{
position:relative;
background:rgba(20,0,40,0.9);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px #7b2fff;
width:380px;
z-index:2;
}

.title{
font-size:42px;
color:#c084ff;
margin-bottom:10px;
text-shadow:0 0 25px #a855f7;
}

.desc{
opacity:0.8;
margin-bottom:25px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#7a2fff;
color:white;
transition:0.25s;
}

button:hover{
background:#9b59ff;
box-shadow:0 0 20px #a855f7;
transform:scale(1.03);
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="title">🌙 Moon Hub</div>

<div class="desc">
Best Roblox Script Hub
</div>

<button onclick="copyScript()">Copy Script</button>

<button onclick="discord()">Join Discord</button>

<div class="footer">
Moon Hub © 2026
</div>

</div>

<script>

function copyScript(){

const text = "loadstring(game:HttpGet('https://raw.moonhub.xyz/loader.lua'))()"

navigator.clipboard.writeText(text).then(function(){
alert("Script Copied!")
}).catch(function(){
prompt("Copy script:", text)
})

}

function discord(){
window.open("https://discord.gg/moonhub")
}

</script>

</body>
</html>
