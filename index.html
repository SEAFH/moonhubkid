<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moon Hub</title>

<style>

body{
background: radial-gradient(circle at top,#0b0015,#020006);
color:white;
font-family:Arial;
text-align:center;
padding-top:80px;
}

/* title */

.title{
font-size:80px;
font-weight:bold;
color:#a855f7;
text-shadow:0 0 30px #9333ea;
}

.subtitle{
color:#bbb;
margin-top:10px;
font-size:22px;
}

.subtitle span{
color:#c084fc;
}

/* script box */

.script-box{
margin:40px auto;
background:#111;
border-radius:12px;
padding:18px;
width:520px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #9333ea;
box-shadow:0 0 15px #9333ea55;
font-family:Consolas;
}

.script{
color:#7dd3fc;
font-size:15px;
}

.copy{
cursor:pointer;
font-size:20px;
color:#aaa;
}

/* buttons */

.btn{
padding:15px 30px;
border-radius:10px;
border:none;
margin:10px;
font-size:16px;
cursor:pointer;
}

.primary{
background:#9333ea;
color:white;
}

.secondary{
background:transparent;
border:1px solid #9333ea;
color:#c084fc;
}

/* discord card */

.card{
margin:60px auto;
width:420px;
background:#0b0b18;
border-radius:14px;
padding:30px;
border:1px solid #9333ea;
box-shadow:0 0 20px #9333ea55;
}

.join{
margin-top:20px;
background:#5865F2;
padding:12px;
border-radius:8px;
}

</style>
</head>


<body>

<div class="title">moon</div>

<div class="subtitle">
the only <span>Moon Hub</span> script you'll need
</div>


<div class="script-box">

<div class="script" id="script">
loadstring(game:HttpGet("https://moonhub-seven.vercel.app/loader.lua"))()
</div>

<div class="copy" onclick="copyScript()">📋</div>

</div>


<button class="btn primary">get key</button>
<button class="btn secondary">request script</button>

<p style="color:#a855f7">keyless every weekend!</p>


<div class="card">

<h3>Moon Hub Community</h3>

<p>Join our Discord for updates</p>

<div class="join">
Join Server
</div>

</div>


<script>

function copyScript(){

let text=document.getElementById("script").innerText;

navigator.clipboard.writeText(text);

alert("Copied!");

}

</script>

</body>
</html>
