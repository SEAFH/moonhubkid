<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moon Hub</title>

<style>

body{
background:#050510;
color:white;
font-family:Consolas, monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* main box */

.container{
text-align:center;
background:#0b0b18;
padding:40px;
border-radius:15px;
box-shadow:0 0 40px purple;
width:520px;
}

/* title */

.title{
font-size:40px;
color:#c084ff;
text-shadow:0 0 20px #9333ea;
margin-bottom:10px;
}

.desc{
color:#aaa;
margin-bottom:30px;
}

/* script box */

.script-box{
background:#030712;
padding:20px;
border-radius:10px;
border:1px solid #9333ea;
color:#60a5fa;
box-shadow:0 0 20px #9333ea;
font-size:14px;
overflow:auto;
}

/* copy button */

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#9333ea,#c084fc);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #9333ea;
}

</style>
</head>


<body>

<div class="container">

<div class="title">MOON HUB</div>
<div class="desc">Best Roblox Script Hub</div>

<div class="script-box" id="script">
loadstring(game:HttpGet("https://moon-hub-eight.vercel.app/loader.lua"))()
</div>

<button onclick="copyScript()">Copy Script</button>

</div>


<script>

function copyScript(){

let text = document.getElementById("script").innerText;

navigator.clipboard.writeText(text);

alert("Script Copied!");

}

</script>


</body>
</html>
